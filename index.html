<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Workspace - Corrected Arcball Rotation</title>
    
    <link rel="stylesheet" href="style.css">

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.3/build/index.module.js",
                "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.18/build/index.module.js"
            }
        }
    </script>
</head>
<body>

    <!-- CONTEXT MENU HTML -->
    <div id="context-menu">
        <div class="context-item" id="ctx-copy">Copy (Ctrl+C)</div>
        <div class="context-item" id="ctx-paste">Paste (Ctrl+V)</div>
        <div class="context-divider"></div>
        <div class="context-item" id="ctx-delete" style="color:#f44336;">Delete (Del)</div>
    </div>

    <div class="app-container">
        <div class="top-bar">
            <div id="ui-wrapper">
                <button class="history-btn" id="btn-undo" title="Undo (Ctrl+Z)">↩️</button>
                <button class="history-btn" id="btn-redo" title="Redo (Ctrl+Y)">↪️</button>
                <button class="history-btn" id="btn-face-snap" title="Snap Parallel to Closest of 6 Faces (Ctrl+F)">👁️</button>
                <span id="no-selection-text">Tools:</span>
                <div id="manipulation-tools">
                    <button class="tool-btn active" id="btn-move">Move</button>
                    <button class="tool-btn" id="btn-scale">Size</button>
                    <button class="tool-btn" id="btn-rotate">Rotate</button>
                    <button class="select-btn" id="btn-select">Select Box</button>
                    <button class="pen-btn" id="btn-pen">3D Pen</button>
                    <button class="paint-btn" id="btn-paint">Paint Face</button>
                    <button class="special-btn" id="btn-xray">X-Ray</button>
                    <button class="cutter-btn" id="btn-cutter">Make Cutter</button>
                    <button class="danger-btn" id="btn-delete">Delete</button>
                </div>
            </div>
            <div id="view-cube-container"></div>
        </div>

        <div class="tabs-bar" id="tabs-bar">
            <button id="btn-add-tab" title="Add New Empty 3D Space">+</button>
        </div>

        <div id="properties-panel">
            <div class="prop-group">
                <span id="prop-label">Transform</span>
                X <input type="text" id="inp-x" autocomplete="off">
                Y <input type="text" id="inp-y" autocomplete="off">
                Z <input type="text" id="inp-z" autocomplete="off">
                <span style="color: #666; margin: 0 5px;">|</span>
                All <input type="text" id="inp-all" autocomplete="off" placeholder="All">
            </div>
            <div class="prop-group">
                <span style="font-weight: bold; color: #ff5722;">Pen Size</span>
                <input type="number" id="inp-pen-size" value="0.2" step="0.1" min="0.05">
            </div>
            <div class="prop-group">
                <span style="font-weight: bold; color: #fff;">Color</span>
                <input type="color" id="inp-color">
            </div>
            <button id="btn-execute-cut">EXECUTE CUT</button>
        </div>

        <!-- MAIN BODY WITH VERTICAL LEFT SIDEBAR -->
        <div class="main-body">
            <div class="left-sidebar">
                <button id="add-line" style="background-color: #ff9800;">+ 3D Line</button>
                <button id="add-cube">+ Cube</button>
                <button id="add-sphere">+ Sphere</button>
                <button id="add-cone">+ Cone</button>
                <button id="add-plane">+ Plane</button>
                <button id="add-cylinder">+ Cylinder</button>
                <div class="sidebar-divider"></div>
                <input type="text" id="inp-text-str" placeholder="Text..." autocomplete="off">
                <button id="add-text-btn" style="background-color: #673ab7;">+ Text</button>
                
                <div class="sidebar-divider"></div>
                <span style="font-size: 11px; font-weight: bold; color: #aaa;">Palette</span>
                <div id="palette-grid">
                    <div class="palette-box active" style="background-color: #ff0000;" data-color="#ff0000"></div>
                    <div class="palette-box" style="background-color: #00ff00;" data-color="#00ff00"></div>
                    <div class="palette-box" style="background-color: #0088ff;" data-color="#0088ff"></div>
                    <div class="palette-box" style="background-color: #ffff00;" data-color="#ffff00"></div>
                    <div class="palette-box" style="background-color: #ff00ff;" data-color="#ff00ff"></div>
                    <div class="palette-box" style="background-color: #00ffff;" data-color="#00ffff"></div>
                    <div class="palette-box" style="background-color: #ffffff;" data-color="#ffffff"></div>
                    <div class="palette-box" style="background-color: #ff8800;" data-color="#ff8800"></div>
                </div>
                <input type="color" id="inp-palette-color" title="Change selected color slot" value="#ff0000">
            </div>
            <div id="workspace">
                <div id="selection-marquee"></div>
            </div>
        </div>
    </div>

    <!-- MAIN JAVASCRIPT -->
    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
        import { computeBoundsTree, disposeBoundsTree, acceleratedRaycast } from 'three-mesh-bvh';
        import { Evaluator, Brush, SUBTRACTION } from 'three-bvh-csg';

        THREE.BufferGeometry.prototype.computeBoundsTree = computeBoundsTree;
        THREE.BufferGeometry.prototype.disposeBoundsTree = disposeBoundsTree;
        THREE.Mesh.prototype.raycast = acceleratedRaycast;

        const workspaceEl = document.getElementById('workspace');
        const marqueeEl = document.getElementById('selection-marquee');
        const tabsBarEl = document.getElementById('tabs-bar');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const gridHelper = new THREE.GridHelper(50, 50, 0x444444, 0x222222);
        scene.add(gridHelper);

        const floorPlane = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshBasicMaterial({ visible: false }));
        floorPlane.rotateX(-Math.PI / 2);
        scene.add(floorPlane);

        const camera = new THREE.PerspectiveCamera(50, workspaceEl.clientWidth / workspaceEl.clientHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(workspaceEl.clientWidth, workspaceEl.clientHeight);
        renderer.autoClear = false; 
        workspaceEl.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const selectionGroup = new THREE.Group();
        scene.add(selectionGroup);

        // ========================================================
        // MULTI-WORKSPACE STATE ENGINE
        // ========================================================
        let workspaces = [];
        let activeWorkspaceId = null;
        let nextWorkspaceId = 1;

        function createNewWorkspace() {
            const id = nextWorkspaceId++;
            const ws = {
                id: id,
                name: `Space ${workspaces.length + 1}`,
                objects: [],
                historyStack: [[]], 
                historyIndex: 0,
                cameraPosition: new THREE.Vector3(0, 5, 12),
                cameraQuaternion: new THREE.Quaternion(0, 0, 0, 1),
                target: new THREE.Vector3(0, 0, 0)
            };
            workspaces.push(ws);
            renderTabs();
            return ws;
        }

        function renderTabs() {
            const tabElements = tabsBarEl.querySelectorAll('.tab');
            tabElements.forEach(el => el.remove());
            const btnAdd = document.getElementById('btn-add-tab');

            workspaces.forEach(ws => {
                const tab = document.createElement('div');
                tab.className = `tab ${ws.id === activeWorkspaceId ? 'active' : ''}`;
                tab.textContent = ws.name;
                tab.addEventListener('click', () => switchWorkspace(ws.id));
                tabsBarEl.insertBefore(tab, btnAdd);
            });
        }

        function switchWorkspace(id) {
            if (activeWorkspaceId === id) return;

            deselectObject();
            cancelLineTool();

            if (activeWorkspaceId !== null) {
                const currentWs = workspaces.find(w => w.id === activeWorkspaceId);
                if (currentWs) {
                    objectsArray.forEach(obj => scene.remove(obj));
                    currentWs.objects = [...objectsArray];
                    currentWs.historyStack = [...historyStack];
                    currentWs.historyIndex = historyIndex;
                    currentWs.cameraPosition.copy(camera.position);
                    currentWs.cameraQuaternion.copy(camera.quaternion);
                    currentWs.target.copy(arcballControls.target);
                }
            }

            const targetWs = workspaces.find(w => w.id === id);
            if (targetWs) {
                activeWorkspaceId = id;
                objectsArray.length = 0;
                
                targetWs.objects.forEach(obj => {
                    scene.add(obj);
                    objectsArray.push(obj);
                });
                
                historyStack = [...targetWs.historyStack];
                historyIndex = targetWs.historyIndex;
                
                camera.position.copy(targetWs.cameraPosition);
                camera.quaternion.copy(targetWs.cameraQuaternion);
                camera.up.set(0, 1, 0); 
                arcballControls.target.copy(targetWs.target);
                camera.lookAt(arcballControls.target);
            }

            renderTabs();
        }

        document.getElementById('btn-add-tab').onclick = () => {
            const newWs = createNewWorkspace();
            switchWorkspace(newWs.id);
        };

        // ========================================================
        // TRUE QUATERNION ARCBALL NAVIGATION CONTROLLER
        // ========================================================
        class ArcballController {
            constructor(camera, domElement) {
                this.camera = camera;
                this.domElement = domElement;
                this.enabled = true;
                this.isLockedParallel = false;

                this.target = new THREE.Vector3(0, 0, 0);
                this.rotateSpeed = 1.8;
                this.panSpeed = 1.0;

                this.state = -1; // 0: ROTATE, 1: PAN
                this.shiftDown = false;
                this.ctrlDown = false;
                this.lastScreenVec = new THREE.Vector3();

                this.initEvents();
            }

            projectOnBall(x, y) {
                const rect = this.domElement.getBoundingClientRect();
                const nx = ((x - rect.left) / rect.width) * 2 - 1;
                const ny = -((y - rect.top) / rect.height) * 2 + 1;
                const distSq = nx * nx + ny * ny;
                
                if (distSq <= 1.0) {
                    return new THREE.Vector3(nx, ny, Math.sqrt(1.0 - distSq));
                } else {
                    const norm = 1.0 / Math.sqrt(distSq);
                    return new THREE.Vector3(nx * norm, ny * norm, 0);
                }
            }

            initEvents() {
                window.addEventListener('keydown', (e) => { 
                    if (e.key === 'Shift') this.shiftDown = true; 
                    if (e.key === 'Control' || e.key === 'Meta') this.ctrlDown = true;
                });
                window.addEventListener('keyup', (e) => { 
                    if (e.key === 'Shift') this.shiftDown = false; 
                    if (e.key === 'Control' || e.key === 'Meta') this.ctrlDown = false;
                });

                this.domElement.addEventListener('pointerdown', (e) => {
                    if (!this.enabled || e.target !== this.domElement && !this.domElement.contains(e.target)) return;
                    
                    const isPanModifier = this.shiftDown || this.ctrlDown || e.shiftKey || e.ctrlKey || e.metaKey;

                    if (e.button === 0 && !isPanModifier) this.state = 0;
                    else if (e.button === 1 || (e.button === 0 && isPanModifier) || e.button === 2) this.state = 1;
                    
                    this.lastScreenVec = this.projectOnBall(e.clientX, e.clientY);
                });

                window.addEventListener('pointerup', () => { this.state = -1; });

                window.addEventListener('pointermove', (e) => {
                    if (!this.enabled || this.state === -1) return;
                    if (this.isLockedParallel && this.state === 0) return;

                    const currScreenVec = this.projectOnBall(e.clientX, e.clientY);

                    if (this.state === 0) {
                        const angle = Math.acos(Math.min(1.0, this.lastScreenVec.dot(currScreenVec))) * this.rotateSpeed;
                        if (angle > 0.0001) {
                            
                            // 🐛 BUG FIX: Reversed the Cross Product Vectors here!
                            // This ensures the camera orbits in the correct phase so the 
                            // object visually follows your mouse drag like a real trackball.
                            const camAxis = new THREE.Vector3().crossVectors(currScreenVec, this.lastScreenVec).normalize();
                            
                            const worldAxis = camAxis.clone().transformDirection(this.camera.matrixWorld);

                            const rotQuat = new THREE.Quaternion().setFromAxisAngle(worldAxis, angle);
                            
                            const offset = this.camera.position.clone().sub(this.target);
                            offset.applyQuaternion(rotQuat);
                            this.camera.position.copy(this.target).add(offset);

                            this.camera.quaternion.premultiply(rotQuat);
                            this.camera.quaternion.normalize();
                        }
                    }
                    else if (this.state === 1) {
                        const dx = e.movementX || 0;
                        const dy = e.movementY || 0;
                        const dist = this.camera.position.distanceTo(this.target);
                        const panFactor = dist * 0.0015 * this.panSpeed;

                        const right = new THREE.Vector3(1, 0, 0).applyQuaternion(this.camera.quaternion);
                        const up = new THREE.Vector3(0, 1, 0).applyQuaternion(this.camera.quaternion);

                        const panVec = new THREE.Vector3().addScaledVector(right, -dx * panFactor).addScaledVector(up, dy * panFactor);
                        this.camera.position.add(panVec);
                        this.target.add(panVec);
                    }

                    this.lastScreenVec = currScreenVec;
                });

                this.domElement.addEventListener('wheel', (e) => {
                    if (!this.enabled) return;
                    e.preventDefault();

                    const rect = this.domElement.getBoundingClientRect();
                    const nx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                    const ny = -((e.clientY - rect.top) / rect.height) * 2 + 1;

                    const zoomRaycaster = new THREE.Raycaster();
                    zoomRaycaster.setFromCamera(new THREE.Vector2(nx, ny), this.camera);

                    let zoomTargetPoint = null;

                    if (typeof objectsArray !== 'undefined' && objectsArray.length > 0) {
                        const hits = zoomRaycaster.intersectObjects(objectsArray);
                        if (hits.length > 0) {
                            zoomTargetPoint = hits[0].point.clone();
                        }
                    }

                    if (!zoomTargetPoint) {
                        const camForward = new THREE.Vector3();
                        this.camera.getWorldDirection(camForward);
                        const focusPlane = new THREE.Plane().setFromNormalAndCoplanarPoint(camForward.negate(), this.target);
                        zoomTargetPoint = new THREE.Vector3();
                        if (!zoomRaycaster.ray.intersectPlane(focusPlane, zoomTargetPoint)) {
                            zoomTargetPoint = this.target.clone();
                        }
                    }

                    const rayDir = zoomRaycaster.ray.direction.clone().normalize();
                    const distToPoint = this.camera.position.distanceTo(zoomTargetPoint);
                    const step = distToPoint * (e.deltaY > 0 ? -0.15 : 0.15);

                    if (distToPoint - step > 0.1) {
                        this.camera.position.addScaledVector(rayDir, step);
                        this.target.addScaledVector(rayDir, step);
                    }
                }, { passive: false });

                this.domElement.addEventListener('dblclick', (e) => {
                    const rect = this.domElement.getBoundingClientRect();
                    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                    raycaster.setFromCamera(mouse, this.camera);
                    
                    const hits = raycaster.intersectObjects(objectsArray);
                    if (hits.length > 0) {
                        const hitPt = hits[0].point;
                        const offset = this.camera.position.clone().sub(this.target);
                        this.target.copy(hitPt);
                        this.camera.position.copy(hitPt).add(offset);
                        ptMarker.position.copy(hitPt);
                        ptMarker.visible = true;
                        setTimeout(() => { if (!isDrawingLine) ptMarker.visible = false; }, 800);
                    }
                });
            }
        }

        const arcballControls = new ArcballController(camera, renderer.domElement);
        const transformControls = new TransformControls(camera, renderer.domElement);
        scene.add(transformControls);

        const cubeContainer = document.getElementById('view-cube-container');
        const cubeScene = new THREE.Scene();
        const cubeCamera = new THREE.PerspectiveCamera(50, 1, 0.1, 10);
        cubeCamera.position.set(0, 0, 4);
        const cubeRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        cubeRenderer.setSize(60, 60);
        cubeContainer.appendChild(cubeRenderer.domElement);

        const viewMaterials = [
            new THREE.MeshBasicMaterial({ color: 0xff5555, transparent: true, opacity: 0.8 }), 
            new THREE.MeshBasicMaterial({ color: 0xaa0000, transparent: true, opacity: 0.8 }), 
            new THREE.MeshBasicMaterial({ color: 0x55ff55, transparent: true, opacity: 0.8 }), 
            new THREE.MeshBasicMaterial({ color: 0x00aa00, transparent: true, opacity: 0.8 }), 
            new THREE.MeshBasicMaterial({ color: 0x5555ff, transparent: true, opacity: 0.8 }), 
            new THREE.MeshBasicMaterial({ color: 0x0000aa, transparent: true, opacity: 0.8 })  
        ];
        const viewCubeGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const viewCube = new THREE.Mesh(viewCubeGeo, viewMaterials);
        viewCube.add(new THREE.LineSegments(new THREE.EdgesGeometry(viewCubeGeo), new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 })));
        viewCube.add(new THREE.AxesHelper(1.2));
        cubeScene.add(viewCube);

        const highlightBox = new THREE.BoxHelper(new THREE.Mesh(new THREE.BoxGeometry()), 0x00ff00);
        highlightBox.visible = false;
        scene.add(highlightBox);

        let currentMode = 'translate';
        let isEditingInputs = false; 
        let selectedObject = null;
        let selectedMeshes = [];
        const objectsArray = [];

        const noSelectText = document.getElementById('no-selection-text');
        const propertiesPanel = document.getElementById('properties-panel');
        const inpX = document.getElementById('inp-x');
        const inpY = document.getElementById('inp-y');
        const inpZ = document.getElementById('inp-z');
        const inpAll = document.getElementById('inp-all');
        const inpColor = document.getElementById('inp-color');
        const propLabel = document.getElementById('prop-label');
        const inpPenSize = document.getElementById('inp-pen-size');
        const inpPaletteColor = document.getElementById('inp-palette-color');

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Initialize First Space On Startup
        const firstWS = createNewWorkspace();
        activeWorkspaceId = firstWS.id;
        let historyStack = [...firstWS.historyStack];
        let historyIndex = firstWS.historyIndex;
        renderTabs();

        // ========================================================
        // 2x4 COLOR PALETTE & FRONT-FACE ONLY PARALLEL COLORING
        // ========================================================
        const paletteBoxes = document.querySelectorAll('.palette-box');
        let activePaletteBox = paletteBoxes[0];

        function paintObjectColor(obj, newCol) {
            if (obj.isCutter || !obj.geometry || !obj.geometry.attributes.color) return;
            const geom = obj.geometry;
            const colorAttr = geom.attributes.color;

            if (arcballControls.isLockedParallel && geom.index) {
                const posAttr = geom.attributes.position;
                const p1 = new THREE.Vector3(), p2 = new THREE.Vector3(), p3 = new THREE.Vector3();
                const cb = new THREE.Vector3(), ab = new THREE.Vector3();
                
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);

                for (let i = 0; i < geom.index.count; i += 3) {
                    const a = geom.index.getX(i); const b = geom.index.getX(i+1); const c = geom.index.getX(i+2);
                    p1.fromBufferAttribute(posAttr, a).applyMatrix4(obj.matrixWorld);
                    p2.fromBufferAttribute(posAttr, b).applyMatrix4(obj.matrixWorld);
                    p3.fromBufferAttribute(posAttr, c).applyMatrix4(obj.matrixWorld);

                    cb.subVectors(p3, p2); ab.subVectors(p1, p2);
                    const triWorldNormal = cb.cross(ab).normalize();

                    if (triWorldNormal.dot(camDir) < -0.85) {
                        colorAttr.setXYZ(a, newCol.r, newCol.g, newCol.b);
                        colorAttr.setXYZ(b, newCol.r, newCol.g, newCol.b);
                        colorAttr.setXYZ(c, newCol.r, newCol.g, newCol.b);
                    }
                }
            } else {
                for (let i = 0; i < colorAttr.count; i++) {
                    colorAttr.setXYZ(i, newCol.r, newCol.g, newCol.b);
                }
            }
            colorAttr.needsUpdate = true;
        }

        function applyColorToSelected(hexStr) {
            const newCol = new THREE.Color(hexStr);
            inpColor.value = hexStr;
            inpPaletteColor.value = hexStr;
            const targets = selectedMeshes.length > 0 ? selectedMeshes : (selectedObject && selectedObject !== selectionGroup ? [selectedObject] : []);
            targets.forEach(obj => paintObjectColor(obj, newCol));
            if (targets.length > 0) saveState();
        }

        paletteBoxes.forEach(box => {
            box.addEventListener('click', () => {
                paletteBoxes.forEach(b => b.classList.remove('active'));
                box.classList.add('active');
                activePaletteBox = box;
                applyColorToSelected(box.dataset.color);
            });
        });

        inpPaletteColor.addEventListener('input', (e) => {
            const hex = e.target.value;
            if (activePaletteBox) {
                activePaletteBox.style.backgroundColor = hex;
                activePaletteBox.dataset.color = hex;
            }
            applyColorToSelected(hex);
        });

        inpColor.addEventListener('input', (e) => {
            const hex = e.target.value;
            inpPaletteColor.value = hex;
            if (activePaletteBox) {
                activePaletteBox.style.backgroundColor = hex;
                activePaletteBox.dataset.color = hex;
            }
            const newCol = new THREE.Color(hex);
            const targets = selectedMeshes.length > 0 ? selectedMeshes : (selectedObject && selectedObject !== selectionGroup ? [selectedObject] : []);
            targets.forEach(obj => paintObjectColor(obj, newCol));
        });

        inpColor.addEventListener('change', () => saveState());

        // ========================================================
        // HISTORY STATE ENGINE (Undo / Redo)
        // ========================================================
        function cloneSceneGraph(sourceArray) {
            const objMap = new Map();
            const clonedArray = [];

            sourceArray.forEach(obj => {
                const mesh = new THREE.Mesh(obj.geometry, obj.material.clone());
                mesh.position.copy(obj.position);
                mesh.quaternion.copy(obj.quaternion);
                mesh.scale.copy(obj.scale);
                mesh.is2D = obj.is2D;
                mesh.isCutter = obj.isCutter;
                
                mesh.userData = { ...obj.userData }; 
                if (obj.userData.connections) mesh.userData.connections = []; 
                
                objMap.set(obj, mesh);
                clonedArray.push(mesh);
            });

            sourceArray.forEach(obj => {
                const mesh = objMap.get(obj);
                if (obj.userData.isHandle && obj.userData.connections) {
                    obj.userData.connections.forEach(conn => {
                        mesh.userData.connections.push({
                            cylinder: objMap.get(conn.cylinder),
                            sibling: objMap.get(conn.sibling)
                        });
                    });
                } else if (obj.userData.isLine) {
                    mesh.userData.h1 = objMap.get(obj.userData.h1);
                    mesh.userData.h2 = objMap.get(obj.userData.h2);
                }
            });

            return clonedArray;
        }

        function saveState() {
            const currentChildren = [...selectionGroup.children];
            currentChildren.forEach(child => scene.attach(child));

            if (historyIndex < historyStack.length - 1) {
                historyStack = historyStack.slice(0, historyIndex + 1);
            }
            const state = cloneSceneGraph(objectsArray);
            historyStack.push(state);
            historyIndex++;

            currentChildren.forEach(child => selectionGroup.attach(child));
        }

        function restoreState(stateObjects) {
            deselectObject();
            cancelLineTool(); 
            
            objectsArray.forEach(obj => {
                if (obj.parent) obj.parent.remove(obj);
                else scene.remove(obj);
            });
            objectsArray.length = 0;

            const restoredObjects = cloneSceneGraph(stateObjects);
            restoredObjects.forEach(obj => {
                scene.add(obj);
                objectsArray.push(obj);
            });
        }

        document.getElementById('btn-undo').onclick = () => {
            if (historyIndex > 0) { historyIndex--; restoreState(historyStack[historyIndex]); }
        };

        document.getElementById('btn-redo').onclick = () => {
            if (historyIndex < historyStack.length - 1) { historyIndex++; restoreState(historyStack[historyIndex]); }
        };

        // ========================================================
        // COPY / PASTE & SMART RIGHT-CLICK MENU LOGIC
        // ========================================================
        let clipboardObj = null;
        const contextMenu = document.getElementById('context-menu');

        function getClosestViewNormal() {
            const camToTarget = new THREE.Vector3().subVectors(arcballControls.target, camera.position).normalize();
            const axes = [
                new THREE.Vector3(1, 0, 0), new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, -1, 0),
                new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, -1)
            ];
            let maxDot = -Infinity; let closest = axes[4];
            axes.forEach(a => { let d = camToTarget.dot(a); if(d > maxDot) { maxDot = d; closest = a; }});
            return closest;
        }

        function getClosestViewAxisStr() {
            const normal = getClosestViewNormal();
            if (Math.abs(normal.x) > 0.5) return 'X';
            if (Math.abs(normal.y) > 0.5) return 'Y';
            return 'Z';
        }

        function snapCameraToClosestFace() {
            const focus = arcballControls.target;
            const dist = camera.position.distanceTo(focus);
            
            const camToTarget = new THREE.Vector3().subVectors(focus, camera.position).normalize();
            const axes = [
                new THREE.Vector3(1, 0, 0), new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, -1, 0),
                new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, -1)
            ];
            
            let maxDot = -Infinity; let bestForward = axes[4];
            axes.forEach(a => {
                const d = camToTarget.dot(a);
                if (d > maxDot) { maxDot = d; bestForward = a; }
            });
            
            const currentUp = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion).normalize();
            
            let maxUpDot = -Infinity;
            let bestUp = new THREE.Vector3(0, 1, 0);
            if (Math.abs(bestForward.y) > 0.9) bestUp = new THREE.Vector3(0, 0, -bestForward.y);
            
            axes.forEach(a => {
                if (Math.abs(a.dot(bestForward)) < 0.1) {
                    const d = currentUp.dot(a);
                    if (d > maxUpDot) { maxUpDot = d; bestUp = a; }
                }
            });
            
            camera.position.copy(focus).addScaledVector(bestForward, -dist);
            camera.up.copy(bestUp);
            camera.lookAt(focus);
            
            applyGizmoRestrictions(getClosestViewAxisStr());
        }

            } else {

        function cleanGeometry(geom, overrideColor = null) {
            if (!geom.index) {
                const count = geom.attributes.position.count;
                const indices = new Uint32Array(count);
                for (let i = 0; i < count; i++) indices[i] = i;
                geom.setIndex(new THREE.BufferAttribute(indices, 1));
            }
            if (!geom.attributes.color || overrideColor) {
                const count = geom.attributes.position.count;
                const colors = new Float32Array(count * 3);
                const col = overrideColor || new THREE.Color(0xffffff);
                for(let i=0; i<count; i++) { colors[i*3] = col.r; colors[i*3+1] = col.g; colors[i*3+2] = col.b; }
                geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            }

            const toDelete = [];
            for (const key in geom.attributes) if (key !== 'position' && key !== 'normal' && key !== 'color' && key !== 'uv') toDelete.push(key);
            toDelete.forEach(key => geom.deleteAttribute(key));
            
            if (!geom.attributes.normal) geom.computeVertexNormals();
            if (!geom.attributes.uv) {
                const count = geom.attributes.position.count;
                geom.setAttribute('uv', new THREE.BufferAttribute(new Float32Array(count * 2), 2));
            }
            return geom;
        }

        function updateCylinderNode(cyl, h1, h2) {
            const p1 = h1.position; const p2 = h2.position; const len = p1.distanceTo(p2);
            if (len < 0.001) return;
            cyl.scale.set(cyl.scale.x, len, cyl.scale.z); 
            cyl.position.copy(p1).lerp(p2, 0.5);
            cyl.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), p2.clone().sub(p1).normalize());
            cyl.updateMatrixWorld(true);
        }

        function syncHandlesAndLines(obj) {

                obj.userData.connections.forEach(conn => {

                });
            } else if (obj.userData.isLine) {
                const h1 = obj.userData.h1; const h2 = obj.userData.h2;
                if (h1 && h2 && objectsArray.includes(h1) && objectsArray.includes(h2)) {
                    const dir = new THREE.Vector3(0, 1, 0).applyQuaternion(obj.quaternion).normalize();
                    const halfLen = obj.scale.y / 2;
                    h1.position.copy(obj.position).add(dir.clone().multiplyScalar(-halfLen));
                    h2.position.copy(obj.position).add(dir.clone().multiplyScalar(halfLen));
                    
                    h1.userData.connections.forEach(conn => {

                    });

        function getRaysClosestPoint(ray1, ray2) {
            const O1 = ray1.origin; const D1 = ray1.direction.clone().normalize();
            const O2 = ray2.origin; const D2 = ray2.direction.clone().normalize();
            const w0 = new THREE.Vector3().subVectors(O1, O2);
            const a = 1.0; const b = D1.dot(D2); const c = 1.0; const d = D1.dot(w0); const e = D2.dot(w0);
            const denom = a * c - b * b;
            if (Math.abs(denom) < 1e-6) return O1.clone().add(D1.clone().multiplyScalar(10));
            const s = (b * e - c * d) / denom; const t = (a * e - b * d) / denom;
            const p1 = new THREE.Vector3().copy(O1).add(D1.clone().multiplyScalar(s));
            const p2 = new THREE.Vector3().copy(O2).add(D2.clone().multiplyScalar(t));
            return new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
        }

            const planeNormal = getClosestViewNormal(); 
            const mathPlane = new THREE.Plane().setFromNormalAndCoplanarPoint(planeNormal.clone().negate(), focus);
            const targetPt = new THREE.Vector3(); if (raycaster.ray.intersectPlane(mathPlane, targetPt)) return targetPt; return new THREE.Vector3();
        }

                    const targetBrush = new Brush(obj.geometry, obj.material);
                    targetBrush.position.copy(obj.getWorldPosition(new THREE.Vector3())); targetBrush.quaternion.copy(obj.getWorldQuaternion(new THREE.Quaternion()));
                    targetBrush.scale.copy(obj.getWorldScale(new THREE.Vector3())); targetBrush.updateMatrixWorld(true);
                    try {
                        const result = evaluator.evaluate(targetBrush, cutterBrush, SUBTRACTION);
                        if (result && result.geometry.attributes.position.count > 0) {
                            objectsToRemove.push(obj); const origMaterial = obj.userData.originalMaterial || obj.material;
                            const islands = splitMesh(result, origMaterial); newObjects.push(...islands);
                        }
                    } catch (err) { console.error("CSG Cut Error:", err); alert("Cut failed: Geometry indexing error."); }
                }
            });
            objectsToRemove.forEach(obj => { if (obj.parent) obj.parent.remove(obj); else scene.remove(obj); objectsArray.splice(objectsArray.indexOf(obj), 1); });
            newObjects.forEach(obj => { scene.add(obj); objectsArray.push(obj); });
            if(objectsToRemove.length > 0) { deselectObject(); saveState(); }
        };

        document.getElementById('btn-delete').onclick = () => {
            const targets = selectedMeshes.length > 0 ? [...selectedMeshes] : (selectedObject && selectedObject !== selectionGroup ? [selectedObject] : []);
            if (targets.length > 0) {
                while (selectionGroup.children.length > 0) scene.attach(selectionGroup.children[0]);
                targets.forEach(obj => {
                    if (obj.userData.isHandle) {
                        obj.userData.connections.forEach(conn => {
                            const sibling = conn.sibling; if (sibling) sibling.userData.connections = sibling.userData.connections.filter(c => c.cylinder !== conn.cylinder);
                            if (conn.cylinder && conn.cylinder.parent) { scene.remove(conn.cylinder); objectsArray.splice(objectsArray.indexOf(conn.cylinder), 1); }
                        });
                    }
                    else if (obj.userData.isLine) {
                        const h1 = obj.userData.h1; const h2 = obj.userData.h2;
                        if (h1) h1.userData.connections = h1.userData.connections.filter(c => c.cylinder !== obj);
                        if (h2) h2.userData.connections = h2.userData.connections.filter(c => c.cylinder !== obj);
                    }
                    if (obj.parent) obj.parent.remove(obj); else scene.remove(obj);
                    const idx = objectsArray.indexOf(obj);
                    if (idx !== -1) objectsArray.splice(idx, 1);
                });
                deselectObject(); saveState();
            }
        };

        const resizeObserver = new ResizeObserver(() => {
            camera.aspect = workspaceEl.clientWidth / workspaceEl.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(workspaceEl.clientWidth, workspaceEl.clientHeight);
        });
        resizeObserver.observe(workspaceEl);

        function animate() {
            requestAnimationFrame(animate); 
            renderer.setViewport(0, 0, workspaceEl.clientWidth, workspaceEl.clientHeight); renderer.setScissor(0, 0, workspaceEl.clientWidth, workspaceEl.clientHeight);
            renderer.setScissorTest(true); renderer.clear(); renderer.render(scene, camera);
            
            cubeCamera.quaternion.copy(camera.quaternion);
            const cubeSize = 60; renderer.setViewport(0, 0, cubeSize, cubeSize); cubeRenderer.render(cubeScene, cubeCamera);
        }

        setTimeout(saveState, 500);
        animate();
    </script>
</body>
</html>
